<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LeetGit Configuration</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 320px;
      padding: 16px;
      margin: 0;
      color: #333;
      background: #f9f9f9;
    }
    h1 {
      font-size: 18px;
      margin-top: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 12px;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #333;
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
    }
    .status.success { color: #16a34a; }
    .status.error { color: #dc2626; }
  </style>
</head>
<body>
  <h1>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
    LeetGit Sync
  </h1>
  <div class="form-group">
    <label for="backendUrl">Backend URL (optional)</label>
    <input type="text" id="backendUrl" placeholder="http://localhost:3000" />
  </div>
  <div class="form-group">
    <label for="extensionSecret">Extension Secret Key</label>
    <input type="password" id="extensionSecret" placeholder="Paste your secret key here" />
  </div>
  <button id="saveBtn">Save Settings</button>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
